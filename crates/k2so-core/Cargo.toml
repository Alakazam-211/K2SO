[package]
name = "k2so-core"
version = "0.33.0-dev"
edition = "2021"
license = "MIT"
description = "K2SO device-local core library: db, llm, terminal, companion, scheduler, agent_hooks, push_adapter. Linked by both src-tauri (Tauri app, thin client) and k2so-daemon (persistent-agent runtime)."

[lib]
path = "src/lib.rs"

[dependencies]
# perf.rs uses parking_lot::Mutex for the global histogram registry.
# Cross-platform dep; will host SQLite/terminal/etc. migrations later.
parking_lot = "0.12"
