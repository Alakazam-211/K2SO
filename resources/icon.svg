<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="4" y="4" width="504" height="504" rx="78" ry="78" fill="none" stroke="#333" stroke-width="2"/>
  <!-- "K2" text -->
  <text x="256" y="290" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="220" font-weight="bold" fill="#e0e0e0" text-anchor="middle" dominant-baseline="central">K2</text>
  <!-- Subtle accent line -->
  <rect x="100" y="400" width="312" height="3" rx="1.5" fill="#4a9eff" opacity="0.6"/>
</svg>
